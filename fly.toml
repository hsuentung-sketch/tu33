# ============================================================
# Fly.io configuration — ERP LINE Bot
# Docs: https://fly.io/docs/reference/configuration/
# ============================================================

# NOTE: app name must be globally unique on fly.io.
# Replace with whatever `fly launch` assigns or your preferred name.
app = "erp-line-bot"

# Tokyo region — shortest combined latency to台灣 users + Supabase Singapore.
primary_region = "nrt"

[build]
  # Uses the Dockerfile in repo root.

[env]
  PORT = "3000"
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  # Keep machine always running (no cold start — the reason we moved here).
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

  # Liveness / readiness probe (existing /health endpoint in src/index.ts).
  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

# 512MB is enough for PDFKit + sharp + Prisma. Can shrink to 256MB once
# usage is known, but likely OOMs on concurrent PDF generation.
[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
