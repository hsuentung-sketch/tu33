# fly.toml app configuration file generated for erp-line-bot on 2026-04-19T16:35:23+08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'erp-line-bot'
primary_region = 'nrt'

[build]

[deploy]
  # 每次 deploy 自動同步 schema（新增 table/column 自動套用）。
  # 不帶 --accept-data-loss：若有破壞性變更（drop column）會中止 deploy，需手動處理。
  release_command = 'sh -c "node node_modules/prisma/build/index.js db push --url $DATABASE_URL"'

[env]
  NODE_ENV = 'production'
  PORT = '3000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 100
    soft_limit = 80

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '15s'
    method = 'GET'
    path = '/health'

[[mounts]]
  source = 'einvoice_data'
  destination = '/data'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1024mb'
  cpus = 1
  memory_mb = 1024
