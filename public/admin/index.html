<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ERP 後台管理</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      ERP 後台
      <small id="brandSub">載入中…</small>
    </div>
    <button class="hamburger" id="navToggle" aria-label="選單" aria-expanded="false">≡</button>
    <nav id="nav">
      <a href="#dashboard" data-view="dashboard">總覽</a>
      <a href="#management" data-view="management">管理</a>
      <a href="#quotations" data-view="quotations">報價單</a>
      <a href="#sales-orders" data-view="sales-orders">銷貨單</a>
      <a href="#sales" data-view="sales">業務功能</a>
      <a href="#purchase-orders" data-view="purchase-orders" data-deny-sales>進貨單</a>
      <a href="#accounts" data-view="accounts">帳款</a>
      <a href="#invoices" data-view="invoices">發票</a>
      <a href="#accounting" data-view="accounting" data-deny-sales>會計</a>
      <a href="#inventory" data-view="inventory">庫存</a>
      <a href="#company" data-view="company" data-admin-only>公司資料</a>
      <a href="#logs" data-view="logs" data-admin-only>紀錄</a>
      <a href="#help" data-view="help">使用說明</a>
    </nav>
    <div id="user">
      <span id="meLabel" style="font-size:13px;color:var(--topbar-muted);white-space:nowrap;">—</span>
      <div id="versionInfo" style="font-size:10px;color:var(--topbar-muted);line-height:1.4;text-align:right;"></div>
      <button id="logoutBtn" style="background:transparent;color:var(--topbar-muted);border:1px solid #334155;border-radius:4px;padding:4px 10px;cursor:pointer;font-size:12px;">登出</button>
    </div>
  </header>
  <main class="main" id="main">
    <div class="empty">載入中…</div>
  </main>
  <script>
    // 漢堡選單 toggle
    document.getElementById('navToggle').addEventListener('click', function() {
      const open = document.body.classList.toggle('nav-open');
      this.setAttribute('aria-expanded', open);
    });
    // 點選 nav 連結後收起
    document.getElementById('nav').addEventListener('click', function(e) {
      if (e.target.tagName === 'A') document.body.classList.remove('nav-open');
    });
  </script>
  <script src="./app.js"></script>
</body>
</html>
