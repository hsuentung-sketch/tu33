<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>新增報價單</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif; margin: 0; padding: 16px; background: #f5f5f5; color: #222; }
    h1 { font-size: 18px; margin: 0 0 12px; }
    label { display: block; font-size: 12px; color: #555; margin-top: 12px; }
    input, textarea, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
    .card { background: #fff; border-radius: 8px; padding: 12px; margin-bottom: 12px; box-shadow: 0 1px 2px rgba(0,0,0,.04); }
    .row { display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 8px; align-items: end; }
    button { padding: 10px 16px; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; }
    .btn-primary { background: #06c755; color: white; }
    .btn-secondary { background: #ddd; }
    .btn-danger { background: #e74c3c; color: white; }
    .totals { text-align: right; font-size: 14px; }
    .totals .total { font-size: 18px; font-weight: bold; }
    .item-head { font-size: 12px; color: #555; display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 8px; }
    .empty { color: #888; font-size: 13px; text-align: center; padding: 16px; }
  </style>
</head>
<body>
  <h1>新增報價單</h1>

  <div class="card">
    <label>客戶</label>
    <input id="customer-search" placeholder="輸入客戶名關鍵字…" autocomplete="off" />
    <div id="customer-hint" style="font-size:12px;color:#888;margin-top:4px;">輸入 2 個以上字會自動搜尋</div>
    <select id="customer-select" size="4" style="margin-top:8px;display:none;"></select>
    <div id="customer-picked" style="margin-top:8px;font-size:14px;color:#06c755;"></div>
  </div>

  <div class="card">
    <label>業務</label>
    <input id="sales-person" placeholder="業務姓名（自動帶入）" />
  </div>

  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <strong>品項</strong>
      <button class="btn-secondary" id="add-item">+ 新增品項</button>
    </div>
    <div class="item-head" style="margin-top:8px;">
      <span>品項</span><span>數量</span><span>單價</span><span></span>
    </div>
    <div id="items"></div>
    <div class="empty" id="empty-items">尚未新增品項</div>
    <datalist id="product-list"></datalist>
  </div>

  <div class="card totals">
    <div>小計: <span id="subtotal">0</span></div>
    <div>營業稅(5%): <span id="tax">0</span></div>
    <div class="total">總計: <span id="total">0</span></div>
  </div>

  <div class="card">
    <label>備註</label>
    <textarea id="note" rows="2"></textarea>
  </div>

  <button class="btn-primary" id="submit" style="width:100%;">送出報價單</button>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    // LIFF ID: baked in at deploy time; query-string override for testing.
    const liffId = new URLSearchParams(location.search).get('liffId') || '2009797959-uDVN0eGQ';
    let idToken = null;

    async function init() {
      if (!liffId) { alert('Missing liffId'); return; }
      await liff.init({ liffId });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      idToken = liff.getIDToken();
      // LIFF caches the id-token from the last login forever — it does
      // NOT auto-refresh. If it's expired we must trigger login again
      // (which redirects, gets a fresh token, and returns here).
      if (!idToken || isTokenExpired(idToken)) {
        try { liff.login(); } catch (_) { /* noop */ }
        return;
      }
      await prefillSalesPerson();
    }

    function isTokenExpired(token) {
      try {
        const parts = token.split('.');
        if (parts.length !== 3) return true;
        const payloadJson = atob(parts[1].replace(/-/g, '+').replace(/_/g, '/'));
        const payload = JSON.parse(payloadJson);
        // 60-second safety margin so we don't fire off a request that
        // expires mid-flight.
        return !payload.exp || payload.exp * 1000 < Date.now() + 60_000;
      } catch (_) {
        return true;
      }
    }

    // Always fetch the freshest id-token from the LIFF SDK before each
    // API call. The LIFF SDK transparently refreshes if it can; if not,
    // we re-trigger login so the user gets a fresh one. This avoids the
    // "works for a while then 401" pattern when the tab stays open past
    // the 1-hour token TTL.
    function freshToken() {
      try {
        const t = liff.getIDToken();
        if (t) { idToken = t; return t; }
      } catch (_) { /* noop */ }
      return idToken;
    }

    async function authedFetch(url, opts = {}) {
      const token = freshToken();
      // Proactively re-login if the cached token has already expired.
      // This handles the "user leaves LIFF tab open overnight" case
      // without requiring a server round-trip first.
      if (!token || isTokenExpired(token)) {
        try { liff.login(); } catch (_) { /* noop */ }
        return new Response(JSON.stringify({ error: { message: 'Token expired — 重新登入中' } }), { status: 401 });
      }
      return fetch(url, {
        ...opts,
        headers: { ...(opts.headers || {}), Authorization: `Bearer ${token}` },
      });
    }

    async function prefillSalesPerson() {
      try {
        const res = await authedFetch('/api/me');
        if (!res.ok) return;
        const me = await res.json();
        const input = document.getElementById('sales-person');
        if (me.name && !input.value) input.value = me.name;
      } catch (_) { /* noop */ }
    }

    const itemsEl = document.getElementById('items');
    const emptyEl = document.getElementById('empty-items');
    let items = [];

    function render() {
      itemsEl.innerHTML = '';
      emptyEl.style.display = items.length ? 'none' : 'block';
      items.forEach((it, i) => {
        const div = document.createElement('div');
        div.className = 'row';
        div.innerHTML = `
          <input placeholder="品項關鍵字" value="${it.name || ''}" data-i="${i}" data-k="name" list="product-list" autocomplete="off" />
          <input type="number" placeholder="數量" value="${it.qty || ''}" data-i="${i}" data-k="qty" />
          <input type="number" placeholder="單價" value="${it.price || ''}" data-i="${i}" data-k="price" />
          <button class="btn-danger" data-del="${i}">刪</button>
        `;
        itemsEl.appendChild(div);
      });
      recalc();
    }

    function recalc() {
      const subtotal = items.reduce((s, it) => s + (Number(it.qty) || 0) * (Number(it.price) || 0), 0);
      const tax = Math.round(subtotal * 0.05);
      const total = subtotal + tax;
      document.getElementById('subtotal').textContent = subtotal.toLocaleString();
      document.getElementById('tax').textContent = tax.toLocaleString();
      document.getElementById('total').textContent = total.toLocaleString();
    }

    document.getElementById('add-item').onclick = () => {
      items.push({ name: '', qty: 1, price: 0 });
      render();
    };

    // Cache: maps product full-name → { name, salePrice }
    const productCache = new Map();
    let productTimer;

    itemsEl.addEventListener('input', (e) => {
      const t = e.target;
      if (t.dataset.i == null || !t.dataset.k) return;
      const idx = +t.dataset.i;
      items[idx][t.dataset.k] = t.value;

      if (t.dataset.k === 'name') {
        const q = t.value.trim();
        clearTimeout(productTimer);
        if (q.length >= 2) {
          productTimer = setTimeout(() => searchProducts(q), 200);
        }
        // If the typed value matches a cached product, auto-fill unit price.
        const hit = productCache.get(t.value);
        if (hit && !items[idx].price) {
          items[idx].price = hit.salePrice;
          render();
          return;
        }
      }
      recalc();
    });

    async function searchProducts(q) {
      if (!idToken) return;
      try {
        const res = await authedFetch(`/api/products?q=${encodeURIComponent(q)}`);
        if (!res.ok) return;
        const list = await res.json();
        const dl = document.getElementById('product-list');
        dl.innerHTML = '';
        list.forEach((p) => {
          const opt = document.createElement('option');
          opt.value = p.name;
          opt.label = `$${Number(p.salePrice).toLocaleString()}`;
          dl.appendChild(opt);
          productCache.set(p.name, { name: p.name, salePrice: Number(p.salePrice) });
        });
      } catch (_) { /* noop */ }
    }

    itemsEl.addEventListener('click', (e) => {
      const idx = e.target.dataset.del;
      if (idx != null) {
        items.splice(+idx, 1);
        render();
      }
    });

    // Customer search (debounced) + autoselect single match
    let searchTimer;
    let selectedCustomer = null;
    const searchEl = document.getElementById('customer-search');
    const selectEl = document.getElementById('customer-select');
    const hintEl = document.getElementById('customer-hint');
    const pickedEl = document.getElementById('customer-picked');

    searchEl.addEventListener('input', (e) => {
      selectedCustomer = null;
      pickedEl.textContent = '';
      const q = e.target.value.trim();
      clearTimeout(searchTimer);
      if (q.length < 2) {
        selectEl.style.display = 'none';
        hintEl.textContent = '輸入 2 個以上字會自動搜尋';
        return;
      }
      hintEl.textContent = '搜尋中…';
      searchTimer = setTimeout(() => searchCustomers(q), 250);
    });

    selectEl.addEventListener('change', () => {
      const opt = selectEl.selectedOptions[0];
      if (!opt) return;
      selectedCustomer = { id: opt.value, name: opt.textContent };
      pickedEl.textContent = '✅ 已選擇：' + opt.textContent;
    });

    async function searchCustomers(q) {
      if (!idToken) {
        hintEl.textContent = '尚未登入，請稍候…';
        return;
      }
      const res = await authedFetch(`/api/customers?q=${encodeURIComponent(q)}`);
      if (!res.ok) {
        let detail = '';
        try {
          const j = await res.json();
          detail = j?.error?.message ? `：${j.error.message}` : '';
        } catch (_) { /* noop */ }
        hintEl.textContent = `搜尋失敗（${res.status}）${detail}`;
        return;
      }
      const list = await res.json();
      if (!Array.isArray(list) || list.length === 0) {
        selectEl.style.display = 'none';
        hintEl.textContent = '找不到符合的客戶';
        return;
      }
      hintEl.textContent = '找到 ' + list.length + ' 筆，請選擇';
      selectEl.innerHTML = list.map((c) => `<option value="${c.id}">${c.name}</option>`).join('');
      selectEl.style.display = 'block';
      // Single match → auto-select and surface the full name.
      if (list.length === 1) {
        selectEl.selectedIndex = 0;
        selectedCustomer = { id: list[0].id, name: list[0].name };
        searchEl.value = list[0].name;
        pickedEl.textContent = '✅ 已自動選擇：' + list[0].name;
      }
    }

    const submitBtn = document.getElementById('submit');
    submitBtn.addEventListener('click', onSubmit);

    async function onSubmit() {
      submitBtn.disabled = true;
      submitBtn.textContent = '送出中…';
      try {
        const customerId = selectedCustomer?.id || selectEl.value;
        const body = {
          customerId,
          salesPerson: document.getElementById('sales-person').value,
          note: document.getElementById('note').value,
          items: items
            .filter((it) => it.name && it.qty && it.price)
            .map((it) => ({
              productName: it.name,
              quantity: Number(it.qty),
              unitPrice: Number(it.price),
            })),
        };
        if (!body.customerId) { alert('請先選擇客戶（從下拉選單點選）'); return; }
        if (body.items.length === 0) { alert('請至少新增一筆有數量和單價的品項'); return; }
        if (!idToken) { alert('尚未登入 LINE，請重新進入表單'); return; }

        const res = await authedFetch('/api/quotations', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const text = await res.text();
        if (!res.ok) {
          alert('送出失敗（' + res.status + '）：' + text);
          return;
        }
        const q = JSON.parse(text);
        // PDF link is pushed to LINE chat by the server after the
        // quotation is created — user will see it from the bot. No
        // need to call liff.sendMessages from the client (it would
        // echo the link as if the user sent it, which is confusing).
        alert('✅ 已建立報價單 ' + q.quotationNo + '\n\nPDF 連結已傳送到 LINE 聊天室。');
        if (liff.closeWindow) liff.closeWindow();
      } catch (err) {
        console.error(err);
        alert('發生錯誤：' + (err && err.message ? err.message : err));
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '送出報價單';
      }
    }

    init();
  </script>
</body>
</html>
